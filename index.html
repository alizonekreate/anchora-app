<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchora App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f2f5f7;
        }

        header {
            background: #0077b6;
            color: white;
            text-align: center;
            padding: 1rem;
            font-size: 1.5rem;
        }

        .container {
            padding: 1rem;
            max-width: 500px;
            margin: auto;
        }

        form,
        .dashboard {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input,
        textarea {
            width: 95%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #0077b6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0.5rem 0;
        }

        button:hover {
            background: #023e8a;
        }

        .list {
            list-style: none;
            padding: 0;
        }

        .list li {
            padding: 0.7rem;
            margin: 0.5rem 0;
            border-radius: 6px;
            background: #f7f7f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        .task-controls button {
            margin-left: 0.3rem;
            padding: 0.3rem 0.5rem;
            font-size: 0.8rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>Anchora App</header>
    <div class="container">


        <form id="registerForm">
            <h2>Register</h2>
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <form id="loginForm" style="display:none;">
            <h2>Login</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="dashboard" id="dashboard" style="display:none;">
            <h2>Welcome!</h2>

            <div>
                <h3>Tasks</h3>
                <input type="text" id="taskInput" placeholder="New Task">
                <button id="addTaskBtn">Add Task</button>
                <ul class="list" id="taskList"></ul>
            </div>

            <div>
                <h3>Habits</h3>
                <input type="text" id="habitInput" placeholder="New Habit">
                <button id="addHabitBtn">Add Habit</button>
                <ul class="list" id="habitList"></ul>
            </div>

            <div>
                <h3>Journal</h3>
                <textarea id="journalInput" rows="3" placeholder="Write your journal..."></textarea>
                <button id="addJournalBtn">Add Entry</button>
                <ul class="list" id="journalList"></ul>
            </div>

            <div>
                <h3>Motivation</h3>
                <ul class="list" id="motivationList"></ul>
            </div>

            <button id="logoutBtn">Logout</button>
        </div>

    </div>

    <script>
        const API = "http://localhost:5000/api";
        let token = "";

        const registerForm = document.getElementById("registerForm");
        const loginForm = document.getElementById("loginForm");
        const dashboard = document.getElementById("dashboard");

        registerForm.addEventListener("submit", async e => {
            e.preventDefault();
            const username = registerForm.querySelector('input[placeholder="Username"]').value;
            const email = registerForm.querySelector('input[placeholder="Email"]').value;
            const password = registerForm.querySelector('input[placeholder="Password"]').value;

            const res = await fetch(`${API}/auth/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                alert("Registered! Now log in.");
                registerForm.style.display = "none";
                loginForm.style.display = "block";
            }
            else alert(data.error);
        });

        loginForm.addEventListener("submit", async e => {
            e.preventDefault();
            const username = loginForm.querySelector('input[placeholder="Username"]').value;
            const password = loginForm.querySelector('input[placeholder="Password"]').value;

            const res = await fetch(`${API}/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                token = data.token;
                loginForm.style.display = "none";
                dashboard.style.display = "block";
                fetchTasks(); fetchHabits(); fetchJournals();
            } else alert(data.error);
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            token = ""; dashboard.style.display = "none"; loginForm.style.display = "block";
        });

        const taskList = document.getElementById("taskList");
        const taskInput = document.getElementById("taskInput");
        document.getElementById("addTaskBtn").addEventListener("click", async () => {
            const content = taskInput.value.trim(); if (!content) return;
            const res = await fetch(`${API}/tasks`, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, body: JSON.stringify({ content }) });
            const task = await res.json(); taskList.appendChild(createTaskItem(task)); taskInput.value = "";
        });
        function createTaskItem(task) {
            const li = document.createElement("li"); li.textContent = task.content;
            if (task.done) li.classList.add("done");
            const btnDone = document.createElement("button"); btnDone.textContent = "Done"; btnDone.onclick = async () => {
                await fetch(`${API}/tasks/${task._id}`, { method: "PUT", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, body: JSON.stringify({ done: !task.done }) });
                li.classList.toggle("done");
            };
            const btnDel = document.createElement("button"); btnDel.textContent = "Delete"; btnDel.onclick = async () => {
                await fetch(`${API}/tasks/${task._id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
                li.remove();
            };
            li.appendChild(btnDone); li.appendChild(btnDel); return li;
        }
        async function fetchTasks() {
            const res = await fetch(`${API}/tasks`, { headers: { "Authorization": `Bearer ${token}` } });
            const tasks = await res.json(); taskList.innerHTML = ""; tasks.forEach(t => taskList.appendChild(createTaskItem(t)));
        }

        const habitList = document.getElementById("habitList");
        const habitInput = document.getElementById("habitInput");
        document.getElementById("addHabitBtn").addEventListener("click", async () => {
            const content = habitInput.value.trim(); if (!content) return;
            const res = await fetch(`${API}/habits`, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, body: JSON.stringify({ content }) });
            const habit = await res.json(); habitList.appendChild(createHabitItem(habit)); habitInput.value = "";
        });
        function createHabitItem(habit) {
            const li = document.createElement("li"); li.textContent = habit.content;
            const btnDel = document.createElement("button"); btnDel.textContent = "Delete"; btnDel.onclick = async () => {
                await fetch(`${API}/habits/${habit._id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
                li.remove();
            };
            li.appendChild(btnDel); return li;
        }
        async function fetchHabits() {
            const res = await fetch(`${API}/habits`, { headers: { "Authorization": `Bearer ${token}` } });
            const habits = await res.json(); habitList.innerHTML = ""; habits.forEach(h => habitList.appendChild(createHabitItem(h)));
        }

        const journalList = document.getElementById("journalList");
        const motivationList = document.getElementById("motivationList");
        const journalInput = document.getElementById("journalInput");
        document.getElementById("addJournalBtn").addEventListener("click", async () => {
            const content = journalInput.value.trim(); if (!content) return;
            const res = await fetch(`${API}/journal`, { method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }, body: JSON.stringify({ content }) });
            const journal = await res.json();
            journalList.appendChild(createJournalItem(journal));
            const motRes = await fetch(`${API}/motivation/${journal._id}`, { headers: { "Authorization": `Bearer ${token}` } });
            const motivations = await motRes.json(); motivations.forEach(m => {
                const li = document.createElement("li"); li.textContent = m.text; motivationList.appendChild(li);
            });
            journalInput.value = "";
        });
        function createJournalItem(j) { const li = document.createElement("li"); li.textContent = j.content; return li; }
        async function fetchJournals() {
            const res = await fetch(`${API}/journal`, { headers: { "Authorization": `Bearer ${token}` } });
            const journals = await res.json(); journalList.innerHTML = ""; motivationList.innerHTML = "";
            for (const j of journals) {
                journalList.appendChild(createJournalItem(j));
                const motRes = await fetch(`${API}/motivation/${j._id}`, { headers: { "Authorization": `Bearer ${token}` } });
                const motivations = await motRes.json(); motivations.forEach(m => {
                    const li = document.createElement("li"); li.textContent = m.text; motivationList.appendChild(li);
                });
            }
        }
    </script>

</body>

</html>
